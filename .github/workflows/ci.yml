name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Compile Python scripts
        run: python -m py_compile sync/xboard_sync.py sync/xboard_report.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate shell syntax
        run: bash -n install.sh update.sh uninstall.sh sync/healthcheck.sh sync/manage.sh
